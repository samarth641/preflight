- id: training-loss-divergence
  title: Training Loss Diverging
  source: PyTorch Documentation
  documentation_url: https://pytorch.org/docs/stable/optim.html
  category: training
  condition:
    field: training.loss_diverging
    operator: eq
    value: true
  recommendation: Reduce learning rate by 10x or check for data/label issues.
  reason: Rapidly increasing loss often indicates learning rate is too high or labels are corrupted.
  confidence: 0.88
  priority: 9
  references:
    - "PyTorch learning rate scheduling"

- id: training-loss-stagnant
  title: Training Loss Has Plateaued
  source: PyTorch Documentation
  documentation_url: https://pytorch.org/docs/stable/optim.html
  category: training
  condition:
    field: training.train_loss_stagnant
    operator: eq
    value: true
  recommendation: Try learning rate warmup, a different optimizer, or unfreeze more layers.
  reason: Loss plateau suggests the model stopped learning with the current hyperparameters.
  confidence: 0.80
  priority: 6
  references:
    - "PyTorch optimizer documentation"

- id: training-overfitting-gap
  title: Train/Validation Loss Gap Detected
  source: PyTorch Documentation
  documentation_url: https://pytorch.org/docs/stable/nn.html
  category: training
  condition:
    field: training.overfitting_detected
    operator: eq
    value: true
  recommendation: Add dropout, weight decay, or data augmentation to reduce overfitting.
  reason: Large gap between training and validation loss indicates the model is memorizing training data.
  confidence: 0.90
  priority: 8
  references:
    - "Regularization best practices"

- id: training-accuracy-plateau
  title: Accuracy Improvement Has Stalled
  source: PyTorch Documentation
  documentation_url: https://pytorch.org/docs/stable/optim.html
  category: training
  condition:
    field: training.accuracy_plateau
    operator: eq
    value: true
  recommendation: Try a learning rate schedule (cosine or step decay), unfreeze more layers, or add augmentation.
  reason: Accuracy gains below 0.5% over several epochs indicate diminishing returns from the current setup.
  confidence: 0.75
  priority: 5
  references:
    - "PyTorch learning rate scheduling"

- id: training-vram-near-limit
  title: VRAM Usage Near Device Limit
  source: NVIDIA CUDA Documentation
  documentation_url: https://docs.nvidia.com/cuda/cuda-runtime-api/group__CUDART__MEMORY.html
  category: training
  condition:
    field: training.vram_usage_percent
    operator: gte
    value: 90
  recommendation: Reduce batch size, enable gradient checkpointing, or use mixed precision to lower VRAM usage.
  reason: VRAM usage above 90% risks out-of-memory errors, especially with variable-length batches.
  confidence: 0.85
  priority: 7
  references:
    - "CUDA Memory Management documentation"

- id: training-nan-loss
  title: NaN or Inf Loss Detected
  source: PyTorch Documentation
  documentation_url: https://pytorch.org/docs/stable/amp.html
  category: training
  condition:
    field: training.loss_is_nan
    operator: eq
    value: true
  recommendation: Lower LR, enable grad clipping, check labels, and verify AMP loss scaling / BF16.
  reason: NaN loss usually means numerical overflow, bad inputs, or unstable mixed precision.
  confidence: 0.93
  priority: 10
  references:
    - "AMP GradScaler"
    - "Debugging NaNs"

- id: training-lr-too-high
  title: Learning Rate Likely Too High
  source: PyTorch Documentation
  documentation_url: https://pytorch.org/docs/stable/optim.html
  category: training
  condition:
    field: training.loss_spike_rate
    operator: gte
    value: 0.3
  recommendation: Reduce peak LR by 2–10x and add warmup; inspect a few batches for outliers.
  reason: Frequent loss spikes often track an aggressive learning rate or bad batches.
  confidence: 0.80
  priority: 7
  references:
    - "LR finder techniques"

- id: training-lr-too-low
  title: Learning Rate Likely Too Low
  source: Preflight Training Analyzer
  documentation_url: https://pytorch.org/docs/stable/optim.html
  category: training
  condition:
    and:
      - field: training.train_loss_stagnant
        operator: eq
        value: true
      - field: training.epoch
        operator: lte
        value: 2
  recommendation: Increase LR (or warmup target) — early stagnation often means the step size is too small.
  reason: If loss barely moves in the first epochs, optimization is under-powered.
  confidence: 0.76
  priority: 6
  references:
    - "Learning rate warmup"

- id: training-cpu-bottleneck
  title: CPU / Data Pipeline Bottleneck
  source: PyTorch Documentation
  documentation_url: https://pytorch.org/docs/stable/data.html
  category: training
  condition:
    and:
      - field: training.gpu_utilization
        operator: lt
        value: 60
      - field: training.cpu_utilization
        operator: gte
        value: 85
  recommendation: Optimize transforms, cache decoded data, raise workers carefully, or preprocess offline.
  reason: Saturated CPU with idle GPU means the host cannot feed the accelerator.
  confidence: 0.86
  priority: 7
  references:
    - "DataLoader performance"

- id: training-val-better-than-train
  title: Validation Loss Lower Than Train
  source: Preflight Training Analyzer
  documentation_url: https://pytorch.org/docs/stable/nn.html
  category: training
  condition:
    field: training.val_loss_below_train
    operator: eq
    value: true
  recommendation: Check dropout/augmentation differences; ensure val uses eval() mode and no train-time noise.
  reason: Val << train often means regularization is on during train only (expected) or a split bug.
  confidence: 0.70
  priority: 3
  references:
    - "train vs eval mode"

- id: training-slow-steps
  title: Step Time Unusually High
  source: Preflight Training Analyzer
  documentation_url: https://pytorch.org/tutorials/recipes/recipes/tuning_guide.html
  category: training
  condition:
    field: training.seconds_per_step
    operator: gte
    value: 5
  recommendation: Profile with PyTorch profiler; check host↔device copies, logging, and checkpoint frequency.
  reason: Multi-second steps on mid models usually indicate I/O or sync bottlenecks, not FLOPs.
  confidence: 0.78
  priority: 5
  references:
    - "PyTorch tuning guide"

- id: training-checkpoint-often
  title: Checkpoint More Frequently
  source: Preflight Training Analyzer
  documentation_url: https://pytorch.org/tutorials/beginner/saving_loading_models.html
  category: training
  condition:
    and:
      - field: training.estimated_hours
        operator: gte
        value: 6
      - field: training.checkpoint_interval_hours
        operator: gt
        value: 2
  recommendation: Save checkpoints every 30–60 minutes (or N steps) for long jobs.
  reason: Long runs without checkpoints risk losing hours of progress on preemptible cloud GPUs.
  confidence: 0.85
  priority: 6
  references:
    - "Saving and loading models"
