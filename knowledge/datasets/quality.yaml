- id: dataset-class-imbalance
  title: Address Class Imbalance
  source: PyTorch Documentation
  documentation_url: https://pytorch.org/docs/stable/nn.html#torch.nn.CrossEntropyLoss
  category: dataset
  condition:
    field: dataset.class_imbalance_ratio
    operator: gte
    value: 5
  recommendation: Use weighted CrossEntropyLoss, oversampling minority classes, or focal loss.
  reason: Severe class imbalance causes models to bias toward majority classes, hurting minority recall.
  confidence: 0.88
  priority: 8
  references:
    - "Focal Loss paper"
    - "PyTorch CrossEntropyLoss documentation"

- id: dataset-low-resolution
  title: Increase Image Resolution
  source: PyTorch Documentation
  documentation_url: https://pytorch.org/vision/stable/transforms.html
  category: dataset
  condition:
    field: dataset.median_resolution
    operator: lt
    value: 224
  recommendation: Consider upscaling images or using a model pretrained at lower resolution.
  reason: Images below 224px may lack detail needed for fine-grained classification tasks.
  confidence: 0.75
  priority: 5
  references:
    - "ImageNet preprocessing standards"

- id: dataset-duplicates
  title: Remove Duplicate Images
  source: PyTorch Documentation
  documentation_url: https://pytorch.org/vision/stable/index.html
  category: dataset
  condition:
    field: dataset.duplicate_percent
    operator: gte
    value: 5
  recommendation: Run deduplication using perceptual hashing before training to prevent data leakage.
  reason: Duplicate images in train/val splits inflate metrics and cause overfitting.
  confidence: 0.86
  priority: 7
  references:
    - "Dataset quality best practices"

- id: dataset-blur
  title: Remove or Fix Blurry Images
  source: PyTorch Documentation
  documentation_url: https://pytorch.org/vision/stable/transforms.html
  category: dataset
  condition:
    field: dataset.blur_percent
    operator: gte
    value: 10
  recommendation: Filter out blurry images or apply sharpening transforms during preprocessing.
  reason: Blurry images reduce feature quality and can degrade model convergence and accuracy.
  confidence: 0.82
  priority: 6
  references:
    - "Image quality assessment best practices"

- id: dataset-missing-labels
  title: Label All Training Images
  source: PyTorch Documentation
  documentation_url: https://pytorch.org/vision/stable/datasets.html
  category: dataset
  condition:
    field: dataset.missing_label_percent
    operator: gte
    value: 5
  recommendation: Organize images into class folders or provide a labels manifest file.
  reason: Unlabeled images cannot be used for supervised training and may cause pipeline errors.
  confidence: 0.90
  priority: 9
  references:
    - "PyTorch ImageFolder documentation"

- id: dataset-small
  title: Increase Dataset Size
  source: PyTorch Documentation
  documentation_url: https://pytorch.org/vision/stable/transforms.html
  category: dataset
  condition:
    field: dataset.image_count
    operator: lt
    value: 500
  recommendation: Use data augmentation, synthetic data generation, or collect more samples.
  reason: Small datasets increase overfitting risk and limit model generalization.
  confidence: 0.80
  priority: 6
  references:
    - "Data augmentation best practices"
