rules:
  - id: hardware-vram-insufficient
    title: Insufficient VRAM for Model Size
    source: NVIDIA CUDA Documentation
    documentation_url: https://docs.nvidia.com/cuda/cuda-c-programming-guide/
    category: hardware
    condition:
      field: hardware.vram_gb
      operator: lt
      value: 8
    recommendation: Consider a GPU with at least 16GB VRAM or enable model parallelism / quantization.
    reason: Models requiring more than 8GB VRAM will not fit on consumer entry-level GPUs.
    confidence: 0.85
    priority: 7
    references:
      - "GPU memory requirements guide"
