rules:
  - id: hardware-vram-insufficient
    title: Insufficient VRAM for Model Size
    source: NVIDIA CUDA Documentation
    documentation_url: https://docs.nvidia.com/cuda/cuda-c-programming-guide/
    category: hardware
    condition:
      field: hardware.vram_gb
      operator: lt
      value: 8
    recommendation: Consider a GPU with at least 16GB VRAM or enable model parallelism / quantization.
    reason: Models requiring more than 8GB VRAM will not fit on consumer entry-level GPUs.
    confidence: 0.85
    priority: 7
    references:
      - "GPU memory requirements guide"

  - id: hardware-large-model-multi-gpu
    title: Use Multi-GPU or Model Parallelism
    source: DeepSpeed Documentation
    documentation_url: https://www.deepspeed.ai/tutorials/zero/
    category: hardware
    condition:
      field: hardware.required_vram_gb
      operator: gte
      value: 40
    recommendation: Consider multi-GPU training with DeepSpeed ZeRO or cloud instances with A100/H100/MI300X.
    reason: Models requiring 40GB+ VRAM exceed single consumer GPU capacity.
    confidence: 0.90
    priority: 8
    references:
      - "DeepSpeed ZeRO documentation"

  - id: hardware-amd-rocm
    title: Verify ROCm Compatibility
    source: AMD ROCm Documentation
    documentation_url: https://rocm.docs.amd.com/
    category: hardware
    condition:
      field: hardware.preferred_vendor
      operator: eq
      value: amd
    recommendation: Verify your model and framework support ROCm before choosing AMD GPUs.
    reason: Not all PyTorch operations and CUDA-optimized libraries have ROCm equivalents.
    confidence: 0.82
    priority: 6
    references:
      - "AMD ROCm compatibility matrix"

  - id: hardware-consumer-vram-tight
    title: Consumer GPU May Be Tight on VRAM
    source: Preflight Hardware Knowledge
    documentation_url: https://huggingface.co/docs/transformers/perf_train_gpu_one
    category: hardware
    condition:
      and:
        - field: hardware.required_vram_gb
          operator: gte
          value: 20
        - field: hardware.required_vram_gb
          operator: lt
          value: 40
    recommendation: Prefer 24GB+ cards (RTX 4090/5090, RX 7900 XTX) or use LoRA/QLoRA to fit consumer VRAM.
    reason: Full fine-tunes of 7B-class models often need 20–40GB; consumer cards sit at the edge.
    confidence: 0.84
    priority: 7
    references:
      - "Hugging Face GPU training guide"

  - id: hardware-datacenter-for-70b
    title: Datacenter GPUs Recommended for 70B-Class Models
    source: Preflight Hardware Knowledge
    documentation_url: https://www.deepspeed.ai/tutorials/zero/
    category: hardware
    condition:
      field: hardware.parameter_count
      operator: gte
      value: 30000000000
    recommendation: Use A100/H100/H200/MI300X with ZeRO-3 or tensor parallelism; avoid single consumer GPUs.
    reason: 30B+ parameter models exceed practical single-GPU full fine-tune capacity.
    confidence: 0.93
    priority: 9
    references:
      - "DeepSpeed ZeRO-3"
      - "Model parallelism guides"

  - id: hardware-prefer-amd-value
    title: Consider AMD for High VRAM per Dollar
    source: AMD ROCm Documentation
    documentation_url: https://rocm.docs.amd.com/
    category: hardware
    condition:
      and:
        - field: hardware.required_vram_gb
          operator: gte
          value: 48
        - field: hardware.preferred_vendor
          operator: ne
          value: nvidia
    recommendation: Evaluate MI300X/MI325X or Azure ND MI300X — often better $/GB than H100 for memory-bound jobs.
    reason: AMD Instinct cards offer 192–256GB HBM at lower cloud hourly rates than equivalent NVIDIA SKUs.
    confidence: 0.80
    priority: 6
    references:
      - "Azure ND MI300X"
      - "ROCm training guides"

  - id: hardware-old-turing
    title: Turing GPUs Are Slow for Modern Training
    source: Preflight Hardware Knowledge
    documentation_url: https://docs.nvidia.com/cuda/
    category: hardware
    condition:
      field: hardware.gpu_architecture
      operator: eq
      value: turing
    recommendation: Prefer Ampere/Ada/Blackwell or CDNA for training; keep Turing for light inference only.
    reason: Turing lacks modern Tensor Core throughput and efficient BF16 paths used by current stacks.
    confidence: 0.82
    priority: 5
    references:
      - "GPU architecture comparison"

  - id: hardware-inference-card-for-train
    title: Inference-Oriented GPU for Training
    source: Preflight Hardware Knowledge
    documentation_url: https://huggingface.co/docs/transformers/perf_train_gpu_one
    category: hardware
    condition:
      field: hardware.gpu_id
      operator: in
      value: ["t4", "l4", "a10"]
    recommendation: Fine for small LoRA/QLoRA; avoid full fine-tunes of 7B+ on T4/L4/A10.
    reason: These SKUs prioritize inference efficiency over training bandwidth and TFLOPS.
    confidence: 0.84
    priority: 6
    references:
      - "Cloud GPU SKU guides"

  - id: hardware-power-budget
    title: High Power Draw — Check PSU / Cloud Limits
    source: Preflight Hardware Knowledge
    documentation_url: https://www.nvidia.com/en-us/data-center/
    category: hardware
    condition:
      field: hardware.power_watts
      operator: gte
      value: 450
    recommendation: Ensure PSU headroom (local) or instance power limits (cloud) for 450W+ GPUs like 4090/5090/H100.
    reason: Undervoltage and thermal throttling silently destroy training throughput.
    confidence: 0.78
    priority: 4
    references:
      - "GPU power requirements"

  - id: hardware-gh200-unified
    title: GH200 Unified Memory Advantage
    source: NVIDIA Documentation
    documentation_url: https://www.nvidia.com/en-us/data-center/grace-hopper-superchip/
    category: hardware
    condition:
      field: hardware.gpu_id
      operator: eq
      value: gh200
    recommendation: Exploit Grace–Hopper coherent memory for large activations/KV; still size batches carefully.
    reason: CPU–GPU coherent HBM/LPDDR reduces host offload friction for memory-heavy jobs.
    confidence: 0.80
    priority: 5
    references:
      - "Grace Hopper architecture"

  - id: hardware-mi350-vs-b200
    title: Compare MI350X vs B200 on Memory vs Software
    source: Preflight Hardware Knowledge
    documentation_url: https://www.amd.com/en/products/accelerators/instinct/mi350.html
    category: hardware
    condition:
      field: hardware.required_vram_gb
      operator: gte
      value: 160
    recommendation: Shortlist MI350X/MI355X (288GB) for capacity; B200/B300 when CUDA ecosystem and NVLink matter more.
    reason: Jul 2026 comparisons show AMD leading HBM capacity; NVIDIA still leads interconnect/software MFU.
    confidence: 0.82
    priority: 6
    references:
      - "MI350X vs B200 2026 analyses"
      - "cloud-gpus.com pricing"

  - id: hardware-marketplace-vs-hyperscaler
    title: Prefer Marketplace GPUs for Cost
    source: Preflight Cost Knowledge
    documentation_url: https://cloud-gpus.com/price-analytics/
    category: hardware
    condition:
      field: hardware.budget_sensitive
      operator: eq
      value: true
    recommendation: Quote RunPod/Vast/TensorWave/DigitalOcean medians before AWS/GCP list prices for the same SKU.
    reason: Jul 2026 H100 marketplace medians ~$3/hr vs hyperscaler list often >$10–90/hr.
    confidence: 0.88
    priority: 7
    references:
      - "AIMultiple GPU index"
      - "cloud-gpus.com Jul 2026"
